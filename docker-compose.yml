version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: nexus_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=nexusepc

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - MONGO_URI=mongodb://mongodb:27017/nexusepc
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  mongo-data:
